<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Logo Variants Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 40px 20px; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-weight: 300; color: #333; font-size: 28px; }
  .header p { color: #888; margin-top: 8px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
  @media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
  .card { background: white; border-radius: 16px; padding: 32px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .card svg { width: 140px; height: 140px; margin-bottom: 16px; }
  .card .number { font-size: 12px; color: #bbb; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; }
  .card .desc { font-size: 13px; color: #666; text-align: center; line-height: 1.5; }
  .footer { text-align: center; margin-top: 40px; color: #ccc; font-size: 12px; }
</style>
</head>
